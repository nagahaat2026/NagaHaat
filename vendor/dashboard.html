<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard - Naga Haat</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .dashboard-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: calc(100vh - 70px);
        }

        .dashboard-sidebar {
            background: var(--color-white);
            border-right: 1px solid #eee;
            padding: var(--spacing-md);
        }

        .dashboard-nav {
            list-style: none;
            padding: 0;
            margin-top: 2rem;
        }

        .dashboard-nav li {
            margin-bottom: 0.5rem;
        }

        .dashboard-nav a {
            display: block;
            padding: 0.75rem 1rem;
            color: var(--color-dark);
            border-radius: var(--border-radius-sm);
            transition: background 0.2s;
        }

        .dashboard-nav a:hover,
        .dashboard-nav a.active {
            background: rgba(139, 0, 0, 0.05);
            color: var(--color-primary);
            font-weight: 500;
        }

        .dashboard-content {
            padding: var(--spacing-xl);
            background: #fafafa;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .stat-card {
            background: var(--color-white);
            padding: var(--spacing-md);
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-sm);
            border-left: 4px solid var(--color-primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--color-white);
            box-shadow: var(--shadow-sm);
            border-radius: var(--border-radius-md);
            overflow: hidden;
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f4f4f4;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="container navbar flex justify-between items-center" style="max-width: 100%; padding: 0.5rem 2rem;">
            <a href="../index.html" class="logo flex items-center gap-sm">
                <img src="../assets/images/logo.jpeg" alt="Naga Haat Logo"
                    style="height: 40px; width: auto; object-fit: contain; filter: brightness(0) invert(1);">
                <span
                    style="background: #388e3c; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold;">VENDOR</span>
            </a>
            <div class="flex items-center gap-md">
                <span id="vendorNameDisplay" style="font-weight: 500;">...</span>
                <button onclick="window.NagaAuth.logout()" class="btn btn-outline" style="padding: 0.5rem 1rem;">Sign
                    Out</button>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <ul class="dashboard-nav">
                <li><a href="dashboard.html" class="active">Overview</a></li>
                <li><a href="add-product.html">Add Product</a></li>
                <li><a href="orders.html">Orders</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-content">
            <h2 style="margin-bottom: 2rem;">Shop Overview</h2>

            <div class="stats-grid">
                <div class="stat-card">
                    <div style="color: #666; font-size: 0.9rem; margin-bottom: 0.5rem;">Total Products</div>
                    <div style="font-size: 2rem; font-weight: 700; color: var(--color-dark);" id="statTotalProducts">0
                    </div>
                </div>
                <div class="stat-card" style="border-left-color: var(--color-secondary);">
                    <div style="color: #666; font-size: 0.9rem; margin-bottom: 0.5rem;">Total Sales (Mock)</div>
                    <div style="font-size: 2rem; font-weight: 700; color: var(--color-dark);">₹12,400</div>
                </div>
                <div class="stat-card" style="border-left-color: #2e7d32;">
                    <div style="color: #666; font-size: 0.9rem; margin-bottom: 0.5rem;">Pending Orders</div>
                    <div style="font-size: 2rem; font-weight: 700; color: var(--color-dark);">3</div>
                </div>
            </div>

            <div class="flex justify-between items-center" style="margin-bottom: 1rem;">
                <h3>Your Products</h3>
                <a href="add-product.html" class="btn btn-primary" style="padding: 0.5rem 1rem;">+ New Product</a>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="vendorProductList">
                        <!-- Injected by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../js/supabaseClient.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/roleManager.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/products.js"></script>
    <script src="../js/vendor.js"></script>
</body>

</html>
